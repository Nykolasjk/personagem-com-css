<head>
  <!DOCTYPE html>
  <html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartinha de personagem</title>
    <link rel="stylesheet" href="./style.css">
  </head>

<body>
  <main class="container">
    <section class="card">
      <img src="./gatojoia.jpg" alt="Imagem do personagem">
      <h1>Garton, o Energúmeno</h1>
      <p class="descricao">Um andarilho das florestas do sul, conhecido por sua bobagem e babaquice.</p>
      <div class="habilidades">
        <h2>Habilidades</h2>
        <ul>
          <li>Insultos pesados</li>
          <li>Mana infinita</li>
          <li>Dedo médio largo </li>
        </ul>
      </div>
      <div class="caracteristicas">
        <h2>Características</h2>
        <p><strong>Classe:</strong> Ladino</p>
        <p><strong>Nível:</strong> 3</p>
        <p><strong>Elemento:</strong> Surpresa</p>
      </div>
    </section>
  </main>
</body>

</html>
